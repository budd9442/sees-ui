name: Deploy Application

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'infra/**'
      - 'docs/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      AWS_REGION: 'us-east-1'
      ECR_REPOSITORY: 'sees-platform-app'
      ECS_SERVICE: 'sees-platform-service'
      ECS_CLUSTER: 'sees-platform-cluster'
      ECS_TASK_DEFINITION: 'sees-platform-app'
      CONTAINER_NAME: 'app'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition-family: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Register new Task Definition
      id: register-task-def
      run: |
        NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
          --cli-input-json "file://${{ steps.task-def.outputs.task-definition }}" \
          --query 'taskDefinition.taskDefinitionArn' --output text)
        echo "task_def_arn=$NEW_TASK_DEF_ARN" >> $GITHUB_OUTPUT

    - name: Run Prisma Migrations
      run: |
        # Use a Public Subnet with Public IP enabled for the one-off migration task.
        # This ensures the image pull (ECR/DockerHub) succeeds immediately without NAT instance dependencies.
        # The task still has the ECS Security Group, so it can reach the RDS database.
        export PUBLIC_SUBNET_ID=$(aws ec2 describe-subnets --filters "Name=tag:Name,Values=sees-platform-public-subnet-0" --query 'Subnets[0].SubnetId' --output text)
        export ECS_SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=sees-platform-ecs-tasks-sg" --query 'SecurityGroups[0].GroupId' --output text)
        
        echo "Launching migration on Subnet: $PUBLIC_SUBNET_ID with Task Def: ${{ steps.register-task-def.outputs.task_def_arn }}"

        TASK_ARN=$(aws ecs run-task \
          --cluster $ECS_CLUSTER \
          --task-definition ${{ steps.register-task-def.outputs.task_def_arn }} \
          --overrides '{"containerOverrides": [{"name": "app", "command": ["npx", "prisma", "migrate", "deploy"]}]}' \
          --launch-type FARGATE \
          --network-configuration "{\"awsvpcConfiguration\": {\"subnets\": [\"$PUBLIC_SUBNET_ID\"], \"securityGroups\": [\"$ECS_SG_ID\"], \"assignPublicIp\": \"ENABLED\"}}" \
          --query 'tasks[0].taskArn' --output text)

        echo "Started migration task: $TASK_ARN"
        aws ecs wait tasks-stopped --cluster $ECS_CLUSTER --tasks $TASK_ARN
        
        # Check task exit code
        EXIT_CODE=$(aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks $TASK_ARN --query 'tasks[0].containers[0].exitCode' --output text)
        if [ "$EXIT_CODE" != "0" ]; then
          echo "Migration task failed with exit code $EXIT_CODE"
          exit 1
        fi

    - name: Update ECS Service
      run: |
        aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --task-definition ${{ steps.register-task-def.outputs.task_def_arn }} \
          --force-new-deployment \
          --region $AWS_REGION

    - name: Wait for service stability
      run: |
        aws ecs wait services-stable \
          --cluster $ECS_CLUSTER \
          --services $ECS_SERVICE \
          --region $AWS_REGION
