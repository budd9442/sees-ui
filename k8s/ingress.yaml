apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sees-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - sees.budd.codes
    secretName: sees-tls
  rules:
  - host: sees.budd.codes
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sees-ui
            port:
              number: 80
