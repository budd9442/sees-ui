version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sees-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: sees_user
      POSTGRES_PASSWORD: sees_password
      POSTGRES_DB: sees_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
