version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sees-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sees-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    restart: unless-stopped

  app:
    build: .
    container_name: sees-app
    restart: unless-stopped
    ports:
      - "3080:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - NEXTAUTH_URL=https://sees.budd.codes
      - AUTH_TRUST_HOST=true
      - NODE_ENV=production
    env_file:
      - .env
    command: >
      sh -c "npx prisma migrate deploy && node server.js"
    depends_on:
      - postgres
      - rabbitmq

  email-worker:
    build: .
    container_name: sees-email-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - NODE_ENV=production
    env_file:
      - .env
    command: npm run worker:email
    depends_on:
      - postgres
      - rabbitmq

  lms-worker:
    build: .
    container_name: sees-lms-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - NODE_ENV=production
    env_file:
      - .env
    command: npm run worker:lms
    depends_on:
      - postgres
      - rabbitmq

  gpa-worker:
    build: .
    container_name: sees-gpa-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - NODE_ENV=production
    env_file:
      - .env
    command: npm run worker:gpa
    depends_on:
      - postgres
      - rabbitmq

volumes:
  postgres_data:
